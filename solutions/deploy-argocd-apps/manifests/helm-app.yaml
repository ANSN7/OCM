apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-app
  namespace: argocd
spec:
  generators:
    - clusterDecisionResource:
        configMapRef: ocm-placement-generator
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: guestbook-app-placement
        requeueAfterSeconds: 30
  template:
    metadata:
      name: '{{clusterName}}-nginx-ingress'
    spec:
      project: default
      source:
        chart: nginx
        repoURL: registry-1.docker.io/bitnamicharts  # note: the oci:// syntax is not included.
        targetRevision: 15.9.0
      destination:
        name: '{{clusterName}}'
        namespace: nginx
      syncPolicy:
        automated:
          prune: true
        syncOptions:
          - CreateNamespace=true
